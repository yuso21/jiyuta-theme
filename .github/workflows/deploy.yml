name: Deploy to ConoHa WING

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p .ssh && chmod 700 .ssh
          echo "${{ secrets.WING_SSH_KEY }}" > .ssh/id_rsa
          chmod 600 .ssh/id_rsa

      - name: Deploy with rsync
        run: |
          rsync -rlptgoD --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "screenshot.jpg" \
            --exclude "screenshot.jpg.webp" \
            -e "ssh -i .ssh/id_rsa -o StrictHostKeyChecking=no -p ${{ secrets.WING_SSH_PORT }}" \
            ./ ${{ secrets.WING_SSH_USER }}@${{ secrets.WING_SSH_HOST }}:~/public_html/jiyuta.com/wp-content/themes/cocoon-child-master/
